spring.application.name=shipfast

# ==============================
# Base A (Primary) - dados principais do dominio
# ==============================
spring.datasource.primary.url=jdbc:h2:mem:primarydb;DB_CLOSE_DELAY=-1
spring.datasource.primary.username=sa
spring.datasource.primary.password=
spring.datasource.primary.driver-class-name=org.h2.Driver

# ==============================
# Base B (Audit) - logs de auditoria
# ==============================
spring.datasource.audit.url=jdbc:h2:mem:auditdb;DB_CLOSE_DELAY=-1
spring.datasource.audit.username=sa
spring.datasource.audit.password=
spring.datasource.audit.driver-class-name=org.h2.Driver

# ==============================
# Hibernate (aplicado aos dois datasources)
# ==============================
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (visivel em /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
